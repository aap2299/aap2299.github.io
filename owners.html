  <!-- FontAwesome for hamburger -->
  <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>

  <style>
    /* Light, page-scoped helpers that won’t clash with your styles.css */
    .page-wrap { width:100%; display:flex; flex-direction:column; min-height:100vh; }
    .owners-header { max-width: 1000px; margin: 0 auto; padding: 1rem 1.2rem; }
    .breadcrumbs { font-size:.9rem; opacity:.8; margin: .25rem 0 .6rem; }
    .owners-toolbar { display:flex; flex-wrap:wrap; gap:.75rem; align-items:center; margin:.75rem 0 1rem; }
    .owners-search { flex:1 1 280px; padding:.6rem .75rem; border:1px solid #ddd; border-radius:.5rem; font-family: inherit; }
    .pill { display:inline-block; padding:.3rem .55rem; border:1px solid #ddd; border-radius:999px; font-size:.85rem; background:#fafafa; }
    
    .owners-main { max-width:1000px; margin:0 auto; padding: 0 1.2rem 1.2rem; width:100%; }
    .owner-group { margin: 1.25rem 0 1.75rem; }
    .owner-group h2 { font-size: 1.15rem; margin:0 0 .25rem; scroll-margin-top: 72px; }
    .meta-line { font-size:.9rem; opacity:.8; margin:0 0 .5rem; }
    .badge { background:#eef6ff; color:#174ea6; border:1px solid #cfe3ff; padding:.15rem .45rem; border-radius:.35rem; font-size:.8rem; }
    .ms-list { list-style: disc; padding-left: 1.25rem; display: grid; gap:.25rem; }
    .empty { opacity:.8; }
    .hit em { background:#ffef9f; font-style:normal; }
    /* --- Tighten up space below search + alphabet bar --- */
/* --- Owners page gap fix --- */

/* 1) Ensure the header doesn't collapse with what's below it */
/* prevent header/list margin-collapsing + tighten spacing */
.owners-header { margin-bottom: 0; padding-bottom: .25rem; display: flow-root; }
.owners-header h1 { margin: .25rem 0 .5rem; }  /* kills big top margin */
.owners-main { margin-top: 0; padding-top: 0; }

/* optional: if your nav is fixed and overlapping, add a spacer */

</head>
<body>

      <ul>
        <li><a  href="index.html">Home</a></li>
        <li><a   href="chapters.html">Text</a></li>
        <li class="dropdown">
          <a class="active"href="manuscripts.html">Manuscripts ▾</a>
          <ul class="dropdown-menu">
            <li><a href="manuscripts.html">Manuscript List</a></li>
            <li><a href="gallery.html">Gallery</a></li>
            <li><a href="sigla.html">Sigla</a></li>
            <li><a href="abbreviations.html">Versions</a></li>
            <li><a href="owners.html">Owners</a></li>
            <li><a href="composite_texts.html">Associated Texts</a></li>
  
  
  
  
          </ul>
        </li>    
        <li><a href="viewers.html">Mirador Workspaces</a></li>
        
  
  
      </ul>
    </nav>

    <!-- Header / tools -->
    <div class="owners-header">
        <div class="breadcrumbs">
          <a href="index.html">Home</a> &gt;
          <a href="manuscripts.html">Manuscripts</a> &gt; Owners
        </div>
        
      <h1>Owners</h1>
      <div class="owners-toolbar">
        <input id="owners-search" class="owners-search" type="search" placeholder="Search owners, shelfmarks, libraries…" aria-label="Search owners"/>
        <span id="owners-count" class="pill">Loading…</span>
        <span id="owners-links" class="pill"></span>
      </div>
</div>
    <!-- Main content -->
    <main class="owners-main" id="owners-list" aria-live="polite">
      <!-- Filled by JS -->
    </main>

    <footer>
      <p>&copy; 2024</p>
    </footer>

  <!-- Page-specific script (does not depend on your script.js) -->
  <script>
    // Utilities
    const slug = s => (s||'').toString().toLowerCase().trim()
      .replace(/[\s+]/g,'-').replace(/[^a-z0-9\-]/g,'').replace(/\-+/g,'-');

    // Highlight search hits
    function mark(text, q) {
      if (!q) return text;
      try {
        const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\\]\\\\]/g, '\\\\$&') + ')', 'ig');
        return text.replace(re, '<em>$1</em>');
      } catch { return text; }
    }

    async function loadOwners() {
      const listEl   = document.getElementById('owners-list');
      const searchEl = document.getElementById('owners-search');
      const countEl  = document.getElementById('owners-count');
      const linksEl  = document.getElementById('owners-links');

      let data = [];
      try {
        const res = await fetch('manuscripts.json');
        if (!res.ok) throw new Error('HTTP ' + res.status);
        data = await res.json();
      } catch (e) {
        console.error(e);
        listEl.innerHTML = '<p class="empty">Could not load manuscripts.json.</p>';
        countEl.textContent = 'Error';
        return;
      }

      // Build owner → manuscripts
      const ownersMap = new Map();
      let linkCount = 0;

      data.forEach((ms, idx) => {
        const ownersKnown = (ms.ownersKnown || '').toLowerCase() === 'yes';
        if (!ownersKnown) return;

        let owners = ms.owners;
        if (!owners) return;
        if (!Array.isArray(owners)) owners = [owners];

        owners
          .map(o => (o ?? '').toString().trim())
          .filter(Boolean)
          .forEach(o => {
            const key = o.toLowerCase();
            if (!ownersMap.has(key)) ownersMap.set(key, { display:o, items:[] });
            ownersMap.get(key).items.push({
              idx,
              shelfmark: ms.shelfmark || '(Untitled)',
              library: ms.library || ''
            });
            linkCount++;
          });
      });

      const ownersArr = Array.from(ownersMap.values())
        .sort((a,b) => a.display.localeCompare(b.display, undefined, {sensitivity:'base'}));

     
      // Render function with filtering
      function render(q = '') {
        const query = q.trim().toLowerCase();
        let html = '';
        let currentLetter = '';
        let visibleOwners = 0;

        ownersArr.forEach(owner => {
          const ownerMatch = query ? owner.display.toLowerCase().includes(query) : true;
          const msFiltered = owner.items.filter(it => {
            if (!query) return true;
            return it.shelfmark.toLowerCase().includes(query) || it.library.toLowerCase().includes(query);
          });
          if (!ownerMatch && msFiltered.length === 0) return;

       

          const id = 'owner-' + slug(owner.display);
          visibleOwners++;

          html += `
            <section class="owner-group" id="${id}">
              <h2 class="hit">${mark(owner.display, q)}</h2>
              <p class="meta-line"><span class="badge">${msFiltered.length} manuscript${msFiltered.length===1?'':'s'}</span></p>
              <ul class="ms-list">
                ${msFiltered.map(it => `
                  <li>
                    <a href="manuscript.html?id=${it.idx}">${mark(it.shelfmark, q)}</a>
                    ${it.library ? ` — <span class="hit">${mark(it.library, q)}</span>` : ''}
                  </li>
                `).join('')}
              </ul>
            </section>
          `;
        });

        listEl.innerHTML = html || `<p class="empty">No owners match your search.</p>`;
        countEl.textContent = ownersArr.length ? `${visibleOwners} owner${visibleOwners===1?'':'s'}` : 'No owners';
      }

      // Initial UI
      document.title = `Owners (${ownersArr.length})`;
      linksEl.textContent = ownersArr.length ? `${linkCount} owner–manuscript link${linkCount===1?'':'s'}` : '';
      render('');

      // Live search (debounced)
      let t;
      searchEl.addEventListener('input', () => {
        clearTimeout(t);
        t = setTimeout(() => render(searchEl.value), 120);
      });

      // Deep link: ?owner=Name
      const params = new URLSearchParams(location.search);
      const target = params.get('owner');
      if (target) {
        const el = document.getElementById('owner-' + slug(target));
        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
    }

    loadOwners();
  </script>
</body>
</html>
