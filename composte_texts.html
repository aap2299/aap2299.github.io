<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Associated Texts</title>

  <!-- Site fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">

  <!-- Site styles -->
  <link rel="stylesheet" href="styles.css">

  <!-- FontAwesome for hamburger -->
  <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>

  <style>
    /* Page-scoped helpers (kept minimal to inherit your theme) */
    .page-wrap { width:100%; display:flex; flex-direction:column; min-height:100vh; }

    .texts-header { max-width: 1000px; margin: 0 auto; padding: 1rem 1.2rem; display: flow-root; }
    .texts-header h1 { margin: .25rem 0 .5rem; }
    .breadcrumbs { font-size:.9rem; opacity:.8; margin:.25rem 0 .6rem; }

    .texts-toolbar { display:flex; flex-wrap:wrap; gap:.75rem; align-items:center; margin:.5rem 0 .75rem; }
    .texts-search { flex:1 1 280px; padding:.6rem .75rem; border:1px solid #ddd; border-radius:.5rem; font-family: inherit; }
    .pill { display:inline-block; padding:.3rem .55rem; border:1px solid #ddd; border-radius:999px; font-size:.85rem; background:#fafafa; }

    .texts-main { max-width:1000px; margin:0 auto; padding: 0 1.2rem 1.2rem; width:100%; }
    .text-group { margin: .5rem 0 1rem; }
    .text-group h2 { font-size: 1.15rem; margin: 0 0 .25rem; }
    

    .ms-list { list-style: disc; padding-left: 1.25rem; display: grid; gap:.25rem; }
    .empty { opacity:.8; }
    .hit em { background:#ffef9f; font-style:normal; }

    /* If your nav is fixed/overlapping, uncomment and adjust:
    body { padding-top: 72px; }
    */
  </style>
</head>
<body>
  <div class="page-wrap">

    <!-- Site nav (add a link to this page in your other navs when convenient) -->
    <nav>
      <input type="checkbox" id="check">
      <label for="check" class="check-btn">
        <i class="fas fa-bars"></i>
      </label>
      <label class="logo"><a href="index.html"><i>De Regimine Principum</i></a></label>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="chapters.html">Text</a></li>
        <li><a href="manuscripts.html">Manuscript List</a></li>
        <li><a href="owners.html">Owners</a></li>
        <li><a href="gallery.html">Gallery</a></li>
        <li><a href="abbreviations.html">Versions</a></li>
        <li><a href="compare.html">Compare Versions</a></li>
        <li><a class="active" href="composite-texts.html">Composite Texts</a></li>
      </ul>
    </nav>

    <!-- Header / tools -->
    <div class="texts-header">
      <div class="breadcrumbs">
        <a href="index.html">Home</a> &gt; <a href="manuscripts.html">Manuscripts</a> &gt; Composite Texts
      </div>

      <h1>Associated Texts</h1>

      <div class="texts-toolbar">
        <input id="texts-search" class="texts-search" type="search"
               placeholder="Search texts, shelfmarks, libraries…" aria-label="Search texts"/>
        <span id="texts-count" class="pill">Loading…</span>
        <span id="texts-links" class="pill"></span>
      </div>
    </div>

    <!-- Main content -->
    <main class="texts-main" id="texts-list" aria-live="polite">
      <!-- Filled by JS -->
    </main>

    <footer>
      <p>&copy; 2024</p>
    </footer>
  </div>

  <script>
    // Utilities
    const slug = s => (s||'').toString().toLowerCase().trim()
      .replace(/[\s+]/g,'-').replace(/[^a-z0-9\-]/g,'').replace(/\-+/g,'-');

    // Highlight search hits
    function mark(text, q) {
      if (!q) return text;
      try {
        const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\\]\\\\]/g, '\\\\$&') + ')', 'ig');
        return text.replace(re, '<em>$1</em>');
      } catch { return text; }
    }

    async function loadCompositeTexts() {
      const listEl   = document.getElementById('texts-list');
      const searchEl = document.getElementById('texts-search');
      const countEl  = document.getElementById('texts-count');
      const linksEl  = document.getElementById('texts-links');

      let data = [];
      try {
        const res = await fetch('manuscripts.json');
        if (!res.ok) throw new Error('HTTP ' + res.status);
        data = await res.json();
      } catch (e) {
        console.error(e);
        listEl.innerHTML = '<p class="empty">Could not load manuscripts.json.</p>';
        countEl.textContent = 'Error';
        return;
      }

      // Build text → manuscripts map (only composite === "yes" & has texts)
      const textsMap = new Map();
      let linkCount = 0;

      data.forEach((ms, idx) => {
        const isComposite = (ms.composite || '').toLowerCase() === 'yes';
        if (!isComposite) return;

        let texts = ms.texts;
        if (!texts) return;
        if (!Array.isArray(texts)) texts = [texts];

        texts
          .map(t => (t ?? '').toString().trim())
          .filter(Boolean)
          .forEach(t => {
            const key = t.toLowerCase();              // case-insensitive dedupe
            if (!textsMap.has(key)) textsMap.set(key, { display: t, items: [] });
            textsMap.get(key).items.push({
              idx,
              shelfmark: ms.shelfmark || '(Untitled)',
              library: ms.library || ''
            });
            linkCount++;
          });
      });

      const textsArr = Array.from(textsMap.values())
        .sort((a,b) => a.display.localeCompare(b.display, undefined, { sensitivity: 'base' }));

      function render(q = '') {
        const query = q.trim().toLowerCase();
        let html = '';
        let visible = 0;

        textsArr.forEach(txt => {
          const textMatch = query ? txt.display.toLowerCase().includes(query) : true;
          const msFiltered = txt.items.filter(it => {
            if (!query) return true;
            return it.shelfmark.toLowerCase().includes(query) || it.library.toLowerCase().includes(query);
          });
          if (!textMatch && msFiltered.length === 0) return;

          const id = 'text-' + slug(txt.display);
          visible++;

          html += `
  <section class="text-group" id="${id}">
    <h2 class="hit">${mark(txt.display, q)}</h2>
    <ul class="ms-list">
      ${msFiltered.map(it => `
        <li>
          <a href="manuscript.html?id=${it.idx}">${mark(it.shelfmark, q)}</a>
          ${it.library ? ` — <span class="hit">${mark(it.library, q)}</span>` : ''}
        </li>
      `).join('')}
    </ul>
  </section>
`;

        });

        listEl.innerHTML = html || `<p class="empty">No texts match your search.</p>`;
        countEl.textContent = textsArr.length ? `${visible} text${visible===1?'':'s'}` : 'No texts';
      }

      // Initial UI
      document.title = `Composite Texts (${textsArr.length})`;
      linksEl.textContent = textsArr.length ? `${linkCount} text–manuscript link${linkCount===1?'':'s'}` : '';
      render('');

      // Live search (debounced)
      let t;
      searchEl.addEventListener('input', () => {
        clearTimeout(t);
        t = setTimeout(() => render(searchEl.value), 120);
      });

      // Deep link: ?text=Some%20Title
      const params = new URLSearchParams(location.search);
      const target = params.get('text');
      if (target) {
        const el = document.getElementById('text-' + slug(target));
        if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
    }

    loadCompositeTexts();
  </script>
</body>
</html>
