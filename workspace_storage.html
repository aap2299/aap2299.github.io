  <title>Saved Mirador Workspace</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      max-width: 900px;
      margin: 2rem auto;
      padding: 1rem;
      line-height: 1.5;
    }
    textarea {
      width: 100%;
      height: 60vh;
      font-family: monospace;
      font-size: 0.9rem;
      padding: 0.5rem;
    }
    .buttons {
      margin-top: 1rem;
    }
    button {
      margin-right: 0.5rem;
      padding: 0.5rem 1rem;
      font-size: 1rem;
    }
    .note {
      background: #f5f5f5;
      padding: 0.75rem;
      border-left: 4px solid #1967d2;
    }
  </style>
</head>
<body>
  <h1>Mirador Workspace Export</h1>
  

  <textarea id="workspace"></textarea>
  <div class="buttons">
    <button id="save">💾 Save</button>
    <button id="copy">📋 Copy</button>
    <button id="clear">🗑️ Clear</button>
  </div>

  <script>
    const textarea = document.getElementById('workspace');
    const saved = localStorage.getItem('miradorWorkspace');
    if (saved) textarea.value = saved;

    document.getElementById('save').addEventListener('click', () => {
      localStorage.setItem('miradorWorkspace', textarea.value);
      alert('Workspace saved locally!');
    });

    document.getElementById('copy').addEventListener('click', async () => {
      await navigator.clipboard.writeText(textarea.value);
      alert('Copied to clipboard!');
    });

    document.getElementById('clear').addEventListener('click', () => {
      if (confirm('Clear saved workspace?')) {
        localStorage.removeItem('miradorWorkspace');
        textarea.value = '';
      }
    });
  </script>
</body>
