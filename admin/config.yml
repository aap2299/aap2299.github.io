backend:
  name: git-gateway
  branch: main

media_folder: "uploads"
public_folder: "/uploads"

collections:
  - name: "manuscripts"
    label: "Manuscripts"
    file: "manuscripts.json"
    fields:
      - label: "Classmark"
        name: "classmark"
        widget: "string"
      - label: "Description"
        name: "description"
        widget: "text"
      - label: "Image URL"
        name: "imgURL"
        widget: "string"
      - label: "Composite/Multi-text"
        name: "composite/multi-text"
        widget: "select"
        options: ["yes", "no"]
